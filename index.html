<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fdfdfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#202227" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Flo's personal portfolio website! Feel free to waddle by if you are interested in what I am up to."
    />
    <link rel="apple-touch-icon" href="./logo192.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>Florian Sihler | Portfolio</title>
  </head>
  <body class="light-theme">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var t = sessionStorage.getItem('theme');
          if (t !== 'light-theme' && t !== 'dark-theme') {
            var mm = window.matchMedia;
            if (mm && mm('(prefers-color-scheme: dark)').matches) t = 'dark-theme';
            else if (mm && mm('(prefers-color-scheme: light)').matches) t = 'light-theme';
            else { var h = new Date().getHours(); t = (h < 6 || h > 22) ? 'dark-theme' : 'light-theme'; }
          }
          document.body.className = t;
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
